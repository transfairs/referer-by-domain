<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referer By Domain - Optionen</title>
    <link rel="stylesheet" href="css/options.css">
</head>
<body>
    <div class="container">
        <h1>Gespeicherte Referer-Header</h1>
        <div class="filter-container">
            <label for="search">Suche nach Domain:</label>
            <input type="text" id="search" placeholder="Filter nach Domain..." />
        </div>
        <button id="addRowButton">Zeile hinzufügen</button>
        <table id="refererTable">
            <thead>
                <tr>
                    <th id="sortDomain">Domain</th>
                    <th id="sortReferer">Referer-Header</th>
                    <th>Aktionen</th>
                </tr>
            </thead>
            <tbody id="refererTableBody">
                <!-- Dynamisch generierte Tabellenzeilen -->
            </tbody>
        </table>

        
        <script src="js/options.js"></script>
    </div>
</body>
</html>
